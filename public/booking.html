<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Tickets - Movie Ticket Reservation</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; }
        nav { background: #333; padding: 10px; margin-bottom: 20px; }
        nav a { color: white; text-decoration: none; margin: 0 15px; }
        form { max-width: 500px; margin: 0 auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; 
                 border-radius: 4px; cursor: pointer; width: 100%; }
        button:hover { background: #0056b3; }
        .message { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <nav>
        <a href="/">Home</a>
        <a href="/movies.html">Movies</a>
        <a href="/booking.html">Book Tickets</a>
    </nav>
    <h1>Book Your Tickets</h1>
    <form id="bookingForm">
        <div class="form-group">
            <label>Select Movie:</label>
            <select id="movieId" required></select>
        </div>
        <div class="form-group">
            <label>Showtime:</label>
            <select id="showtime" required></select>
        </div>
        <div class="form-group">
            <label>Number of Seats:</label>
            <input type="number" id="seats" min="1" required>
        </div>
        <div class="form-group">
            <label>Your Name:</label>
            <input type="text" id="customerName" required>
        </div>
        <div class="form-group">
            <label>Email:</label>
            <input type="email" id="email" required>
        </div>
        <button type="submit">Book Now</button>
    </form>
    <div id="message"></div>
    <script>
        let movies = [];
        fetch('/api/movies')
            .then(res => res.json())
            .then(data => {
                movies = data;
                const select = document.getElementById('movieId');
                movies.forEach(movie => {
                    select.innerHTML += `<option value="${movie.id}">${movie.title} - $${movie.price}</option>`;
                });
                updateShowtimes();
            });

        document.getElementById('movieId').addEventListener('change', updateShowtimes);

        function updateShowtimes() {
            const movieId = document.getElementById('movieId').value;
            const movie = movies.find(m => m.id == movieId);
            const showtimeSelect = document.getElementById('showtime');
            showtimeSelect.innerHTML = '';
            if (movie) {
                movie.showtime.forEach(time => {
                    showtimeSelect.innerHTML += `<option value="${time}">${time}</option>`;
                });
            }
        }

        document.getElementById('bookingForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const booking = {
                movieId: document.getElementById('movieId').value,
                showtime: document.getElementById('showtime').value,
                seats: parseInt(document.getElementById('seats').value),
                customerName: document.getElementById('customerName').value,
                email: document.getElementById('email').value
            };

            fetch('/api/bookings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(booking)
            })
            .then(res => res.json())
            .then(data => {
                const msg = document.getElementById('message');
                if (data.booking) {
                    msg.className = 'message success';
                    msg.innerHTML = `Booking successful! Booking ID: ${data.booking.id}<br>Total: $${data.booking.totalPrice}`;
                    document.getElementById('bookingForm').reset();
                    updateShowtimes();
                } else {
                    msg.className = 'message error';
                    msg.textContent = data.error?.message || 'Booking failed';
                }
            })
            .catch(err => {
                document.getElementById('message').className = 'message error';
                document.getElementById('message').textContent = 'Error: ' + err.message;
            });
        });
    </script>
</body>
</html>
